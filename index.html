<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BULVARA - Web3 Fitness RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#030712',
                            card: '#0f172a',
                            panel: '#1e293b',
                            cyan: '#06b6d4',
                            blue: '#3b82f6',
                            gold: '#f59e0b',
                            green: '#10b981'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shake': 'shake 0.3s cubic-bezier(.36,.07,.19,.97) infinite',
                        'glow': 'glow 2s infinite alternate'
                    },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translate3d(0, 0, 0) rotate(0deg)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translate3d(-2px, 0, 0) rotate(-1deg)' },
                            '20%, 40%, 60%, 80%': { transform: 'translate3d(2px, 0, 0) rotate(1deg)' }
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(6, 182, 212, 0.2), 0 0 10px rgba(6, 182, 212, 0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(6, 182, 212, 0.6), 0 0 30px rgba(59, 130, 246, 0.6)' }
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #030712;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-slate-950">

    <div id="root" class="relative w-full max-w-[450px] h-[100vh] sm:h-[850px] bg-cyber-bg text-slate-100 flex flex-col overflow-hidden sm:rounded-[36px] sm:border-8 sm:border-slate-800 sm:shadow-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // --- State Management & LocalStorage Persistence ---
            const [activeTab, setActiveTab] = useState('gym');
            const [balance, setBalance] = useState(() => Number(localStorage.getItem('bulv_balance')) || 0);
            const [energy, setEnergy] = useState(() => {
                const saved = localStorage.getItem('bulv_energy');
                return saved !== null ? Number(saved) : 100;
            });
            const [stats, setStats] = useState(() => {
                const saved = localStorage.getItem('bulv_stats');
                return saved ? JSON.parse(saved) : { str: 10, mas: 10, end: 10 };
            });
            const [capsules, setCapsules] = useState(() => {
                const saved = localStorage.getItem('bulv_capsules');
                return saved !== null ? Number(saved) : 3;
            });
            const [activeGenes, setActiveGenes] = useState(() => {
                const saved = localStorage.getItem('bulv_genes');
                return saved ? JSON.parse(saved) : [];
            });
            const [completedQuests, setCompletedQuests] = useState(() => {
                const saved = localStorage.getItem('bulv_quests');
                return saved ? JSON.parse(saved) : [];
            });
            const [walletConnected, setWalletConnected] = useState(() => localStorage.getItem('bulv_wallet') === 'true');
            const [lastSavedTime, setLastSavedTime] = useState(() => Number(localStorage.getItem('bulv_last_time')) || Date.now());

            // App Operational States
            const [training, setTraining] = useState(null); // { id, total, remaining }
            const [capsuleOpening, setCapsuleOpening] = useState(false);
            const [questTab, setQuestTab] = useState('social');
            const [verifyingQuest, setVerifyingQuest] = useState(null);
            const [popup, setPopup] = useState(null); // { title, type, content }
            const [showWithdrawModal, setShowWithdrawModal] = useState(false);

            // Sync States to LocalStorage
            useEffect(() => {
                localStorage.setItem('bulv_balance', balance);
                localStorage.setItem('bulv_energy', energy);
                localStorage.setItem('bulv_stats', JSON.stringify(stats));
                localStorage.setItem('bulv_capsules', capsules);
                localStorage.setItem('bulv_genes', JSON.stringify(activeGenes));
                localStorage.setItem('bulv_quests', JSON.stringify(completedQuests));
                localStorage.setItem('bulv_wallet', walletConnected);
                localStorage.setItem('bulv_last_time', lastSavedTime);
            }, [balance, energy, stats, capsules, activeGenes, completedQuests, walletConnected, lastSavedTime]);

            // --- Passive Energy Regeneration & Offline Catchup ---
            useEffect(() => {
                // Handle Offline Regeneration since last app closure
                const now = Date.now();
                const elapsedSeconds = Math.floor((now - lastSavedTime) / 1000);
                const recoveredEnergy = Math.floor(elapsedSeconds / 60);
                if (recoveredEnergy > 0) {
                    setEnergy(prev => Math.min(100, prev + recoveredEnergy));
                }
                setLastSavedTime(now);

                // Live ticker interval (every 1 second)
                const ticker = setInterval(() => {
                    setLastSavedTime(prev => {
                        const nextTime = prev + 1000;
                        // Every 60 seconds passed from reference, increase energy
                        if (Math.floor(Date.now() / 1000) % 60 === 0) {
                            setEnergy(e => Math.min(100, e + 1));
                        }
                        return Date.now();
                    });
                }, 1000);

                return () => clearInterval(ticker);
            }, []);

            // --- Training Timer Countdown Logic ---
            useEffect(() => {
                if (!training) return;
                const timer = setInterval(() => {
                    setTraining(prev => {
                        if (!prev) return null;
                        if (prev.remaining <= 1) {
                            clearInterval(timer);
                            // Complete training sequence
                            completeWorkout(prev.id);
                            return null;
                        }
                        return { ...prev, remaining: prev.remaining - 1 };
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [training]);

            // Total Reward Buff Multiplier from Active Modifiers
            const getMultiplier = () => {
                return activeGenes.reduce((acc, gene) => acc + gene.buff, 1);
            };

            // Workouts Configuration Data
            const baseWorkouts = {
                pushups: { name: 'Push-ups', cost: 20, time: 10, rewardStr: 5, rewardMas: 0, rewardEnd: 0, rewardTokens: 10 },
                squats: { name: 'Squats', cost: 40, time: 30, rewardStr: 0, rewardMas: 10, rewardEnd: 0, rewardTokens: 25 },
                cardio: { name: 'Cardio Blitz', cost: 60, time: 60, rewardStr: 0, rewardMas: 0, rewardEnd: 15, rewardTokens: 50 }
            };

            const triggerWorkout = (id) => {
                if (training) return;
                const workout = baseWorkouts[id];
                if (energy < workout.cost) {
                    setPopup({ title: 'Insufficient Energy', type: 'error', content: 'Rest or harvest capsules to regenerate your energy reserve!' });
                    return;
                }
                setEnergy(prev => Math.max(0, prev - workout.cost));
                setTraining({ id, total: workout.time, remaining: workout.time });
            };

            const completeWorkout = (id) => {
                const workout = baseWorkouts[id];
                const multiplier = getMultiplier();
                const bonusTokens = Math.floor(workout.rewardTokens * multiplier);

                setStats(prev => ({
                    str: prev.str + workout.rewardStr,
                    mas: prev.mas + workout.rewardMas,
                    end: prev.end + workout.rewardEnd
                }));
                setBalance(prev => prev + bonusTokens);

                let statGainText = '';
                if (workout.rewardStr > 0) statGainText += `+${workout.rewardStr} STR `;
                if (workout.rewardMas > 0) statGainText += `+${workout.rewardMas} MAS `;
                if (workout.rewardEnd > 0) statGainText += `+${workout.rewardEnd} END `;

                setPopup({
                    title: 'Workout Complete!',
                    type: 'success',
                    content: `Incredible hustle! You earned ${statGainText} and credited +${bonusTokens} $BULV to your active account (includes ${(multiplier > 1) ? ((multiplier - 1) * 100).toFixed(0) + '%' : '0%'} DNA Lab boost).`
                });
            };

            // --- DNA Gacha Crack Mechanics ---
            const handleCrackCapsule = () => {
                if (capsuleOpening) return;
                
                const usesTokens = capsules === 0;
                if (usesTokens && balance < 500) {
                    setPopup({ title: 'DNA Restructuring Blocked', type: 'error', content: 'You need either 1 Capsule or 500 $BULV tokens to construct structural variants.' });
                    return;
                }

                if (usesTokens) {
                    setBalance(prev => prev - 500);
                } else {
                    setCapsules(prev => prev - 1);
                }

                setCapsuleOpening(true);

                setTimeout(() => {
                    setCapsuleOpening(false);
                    const roll = Math.random() * 100;
                    let selectedGene = null;

                    if (roll < 70) {
                        selectedGene = { id: 'alpha_' + Date.now(), name: 'Common Alpha Gene', buff: 0.05, tier: 'Common', color: 'text-cyan-400 border-cyan-500/30' };
                    } else if (roll < 95) {
                        selectedGene = { id: 'mutant_' + Date.now(), name: 'Rare Cyber Mutant Gene', buff: 0.15, tier: 'Rare', color: 'text-blue-400 border-blue-500/40' };
                    } else {
                        selectedGene = { id: 'banana_' + Date.now(), name: 'Legendary Nano Banana God Gene', buff: 0.50, tier: 'Legendary', color: 'text-amber-400 border-amber-500/60' };
                    }

                    setActiveGenes(prev => [selectedGene, ...prev]);
                    setPopup({
                        title: 'Capsule Mutated!',
                        type: 'dna',
                        content: `Synthesized [${selectedGene.name}] boosting your baseline permanent training rewards by +${selectedGene.buff * 100}%.`
                    });
                }, 2000);
            };

            // --- Quests System Execution ---
            const questsData = {
                social: [
                    { id: 'tg_chan', label: 'Join BULVARA Telegram Channel', reward: 500 },
                    { id: 'invite_3', label: 'Invite 3 Fitness Friends', reward: 1500 },
                    { id: 'follow_x', label: 'Follow BULVARA on X', reward: 400 }
                ],
                fitness: [
                    { id: 'squats_real', label: 'Do 20 squats in real life (Self-verify)', reward: 300 },
                    { id: 'water_2l', label: 'Drink 2L of water today', reward: 200 }
                ]
            };

            const triggerQuestVerification = (quest) => {
                if (completedQuests.includes(quest.id) || verifyingQuest) return;
                setVerifyingQuest(quest.id);

                setTimeout(() => {
                    setCompletedQuests(prev => [...prev, quest.id]);
                    setBalance(prev => prev + quest.reward);
                    setVerifyingQuest(null);
                    setPopup({
                        title: 'Task Verified',
                        type: 'success',
                        content: `Successfully claimed +${quest.reward} $BULV tokens for completing: "${quest.label}".`
                    });
                }, 3000);
            };

            return (
                <div class="flex flex-col w-full h-full justify-between select-none relative bg-slate-950 text-slate-100">
                    
                    {/* TOP USER BAR STATS */}
                    <header class="p-4 bg-cyber-card border-b border-slate-800/80 flex items-center justify-between z-10 shrink-0">
                        <div class="flex items-center gap-2">
                            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-slate-950 shadow-md border border-cyan-400/30">
                                BA
                            </div>
                            <div>
                                <h4 class="text-xs font-bold text-cyan-400 tracking-wide">@CyberAthlete_7</h4>
                                <div class="flex items-center gap-1.5 mt-0.5">
                                    <div class="w-20 bg-slate-800 rounded-full h-1.5 overflow-hidden">
                                        <div class="bg-cyan-400 h-full transition-all duration-300" style={{ width: `${energy}%` }}></div>
                                    </div>
                                    <span class="text-[10px] font-mono text-slate-400">{energy}/100 E</span>
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-900/90 border border-amber-500/20 px-3 py-1.5 rounded-xl flex items-center gap-1.5 shadow-sm">
                            <span class="text-base select-none">🍌</span>
                            <div class="text-right">
                                <p class="text-[9px] uppercase tracking-wider text-amber-500 font-bold -mb-0.5">Balance</p>
                                <p class="text-sm font-black font-mono text-amber-400">{balance.toLocaleString()}</p>
                            </div>
                        </div>
                    </header>

                    {/* MAIN APPLICATION ROUTER AREA */}
                    <main class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24 relative">
                        
                        {/* TAB 1: GYM SCREEN */}
                        {activeTab === 'gym' && (
                            <div class="flex flex-col gap-4 animate-fadeIn">
                                {/* Character Display Window */}
                                <div class="bg-gradient-to-b from-cyber-card to-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col items-center relative overflow-hidden shadow-inner min-h-[280px]">
                                    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(6,182,212,0.12)_0%,transparent_70%)] pointer-events-none"></div>
                                    
                                    {/* Stats Sub-Panel */}
                                    <div class="w-full grid grid-cols-3 gap-2 bg-slate-950/60 p-2 rounded-xl border border-slate-800/40 text-center backdrop-blur-sm z-10">
                                        <div>
                                            <p class="text-[10px] uppercase font-bold tracking-wider text-cyan-400">Strength</p>
                                            <p class="text-base font-extrabold text-slate-200 font-mono">{stats.str}</p>
                                        </div>
                                        <div>
                                            <p class="text-[10px] uppercase font-bold tracking-wider text-blue-400">Muscle</p>
                                            <p class="text-base font-extrabold text-slate-200 font-mono">{stats.mas}</p>
                                        </div>
                                        <div>
                                            <p class="text-[10px] uppercase font-bold tracking-wider text-amber-400">Endurance</p>
                                            <p class="text-base font-extrabold text-slate-200 font-mono">{stats.end}</p>
                                        </div>
                                    </div>

                                    {/* Interactive Humanoid Visual Layer */}
                                    <div class="relative w-44 h-44 flex items-center justify-center my-auto">
                                        <svg class={`w-full h-full text-cyan-500/80 drop-shadow-[0_0_15px_rgba(34,211,238,0.4)] ${training ? 'animate-pulse' : 'animate-pulse-slow'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                                            <circle cx="12" cy="4" r="2" />
                                            <path d="M12 6v7M12 13l-4 8M12 13l4 8M6 8h12" />
                                        </svg>
                                        
                                        {/* Dynamic Workout Processing Overlay */}
                                        {training && (
                                            <div class="absolute inset-0 bg-slate-950/85 rounded-xl flex flex-col justify-center items-center backdrop-blur-sm p-4 border border-cyan-500/20">
                                                <p class="text-xs uppercase font-black text-cyan-400 tracking-widest animate-pulse">Training Hard</p>
                                                <p class="text-3xl font-black text-slate-100 font-mono my-1">{training.remaining}s</p>
                                                <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden mt-1 max-w-[120px]">
                                                    <div class="bg-gradient-to-r from-cyan-400 to-blue-500 h-full transition-all duration-1000 ease-linear" style={{ width: `${(training.remaining / training.total) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Active Routine Section */}
                                <div>
                                    <h3 class="text-xs uppercase tracking-widest font-black text-slate-400 mb-2 px-1">Select Training Routine</h3>
                                    <div class="flex flex-col gap-2.5">
                                        {Object.entries(baseWorkouts).map(([key, item]) => {
                                            const isSelected = training?.id === key;
                                            return (
                                                <button 
                                                    key={key}
                                                    disabled={!!training}
                                                    onClick={() => triggerWorkout(key)}
                                                    class={`p-3.5 rounded-xl border text-left flex items-center justify-between transition-all duration-200 ${
                                                        !!training 
                                                            ? 'border-slate-900 bg-slate-900/40 opacity-40 cursor-not-allowed' 
                                                            : 'border-slate-800 bg-cyber-card hover:border-cyan-500/40 active:scale-[0.98]'
                                                    }`}
                                                >
                                                    <div>
                                                        <div class="flex items-center gap-2">
                                                            <span class="text-sm font-bold text-slate-100">{item.name}</span>
                                                            <span class="text-[10px] font-mono px-1.5 py-0.5 rounded bg-slate-950 text-slate-400 border border-slate-800">⏱ {item.time}s</span>
                                                        </div>
                                                        <p class="text-xs text-slate-400 mt-1">
                                                            Gains: <span class="text-cyan-400 font-medium">
                                                                {item.rewardStr > 0 && `+${item.rewardStr} STR `}
                                                                {item.rewardMas > 0 && `+${item.rewardMas} MAS `}
                                                                {item.rewardEnd > 0 && `+${item.rewardEnd} END `}
                                                            </span>
                                                        </p>
                                                    </div>
                                                    <div class="text-right">
                                                        <div class="text-xs font-black text-amber-400 font-mono">+{Math.floor(item.rewardTokens * getMultiplier())} $BULV</div>
                                                        <div class="text-[10px] text-red-400 font-semibold mt-1">⚡️ {item.cost} Energy</div>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 2: DNA LAB SCREEN */}
                        {activeTab === 'dna' && (
                            <div class="flex flex-col gap-4 animate-fadeIn">
                                {/* Statistics Counter */}
                                <div class="bg-cyber-card border border-slate-800 p-4 rounded-2xl flex justify-between items-center shadow-lg">
                                    <div>
                                        <p class="text-xs text-slate-400 font-semibold">Ready Core Stock</p>
                                        <h2 class="text-xl font-black text-cyan-400 font-mono mt-0.5">{capsules} DNA Capsules</h2>
                                    </div>
                                    <div class="w-10 h-10 rounded-xl bg-slate-950 border border-slate-800 flex items-center justify-center text-xl">
                                        🧬
                                    </div>
                                </div>

                                {/* Animated Interactive Capsule Container */}
                                <div class="bg-gradient-to-b from-cyber-card to-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col items-center justify-center min-h-[250px] relative">
                                    <div class={`w-32 h-32 flex items-center justify-center text-6xl rounded-full bg-slate-950/60 shadow-2xl border border-slate-800 ${capsuleOpening ? 'animate-shake border-cyan-500 shadow-cyan-500/20' : 'animate-pulse'}`}>
                                        🥚
                                    </div>
                                    
                                    <button
                                        disabled={capsuleOpening}
                                        onClick={handleCrackCapsule}
                                        class={`mt-6 w-full max-w-[240px] py-3 rounded-xl font-black uppercase text-xs tracking-wider transition-all duration-150 ${
                                            capsuleOpening 
                                                ? 'bg-slate-800 text-slate-500 cursor-not-allowed'
                                                : 'bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 active:scale-[0.97] text-slate-950 shadow-lg shadow-cyan-500/10'
                                        }`}
                                    >
                                        {capsuleOpening ? 'Synthesizing...' : capsules > 0 ? 'Crack Capsule (Free)' : 'Crack Capsule (500 $BULV)'}
                                    </button>
                                </div>

                                {/* Active Genetic Modifiers Section */}
                                <div>
                                    <h3 class="text-xs uppercase tracking-widest font-black text-slate-400 mb-2 px-1">Active Genetic Modifiers (+{((getMultiplier() - 1) * 100).toFixed(0)}% Buff)</h3>
                                    <div class="flex flex-col gap-2 max-h-[180px] overflow-y-auto no-scrollbar">
                                        {activeGenes.length === 0 ? (
                                            <div class="p-4 rounded-xl border border-dashed border-slate-800 bg-slate-900/30 text-center text-xs text-slate-500">
                                                No modifier strands sequenced yet. Break open capsules above!
                                            </div>
                                        ) : (
                                            activeGenes.map(gene => (
                                                <div key={gene.id} class={`p-3 rounded-xl border bg-cyber-card flex justify-between items-center ${gene.color}`}>
                                                    <div>
                                                        <p class="text-xs font-bold text-slate-200">{gene.name}</p>
                                                        <p class="text-[10px] font-semibold tracking-wider uppercase opacity-60 mt-0.5">{gene.tier}</p>
                                                    </div>
                                                    <div class="font-mono text-xs font-black">+{gene.buff * 100}% Rewards</div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* TAB 3: QUESTS SCREEN */}
                        {activeTab === 'quests' && (
                            <div class="flex flex-col gap-4 animate-fadeIn">
                                {/* Sub Navigation Tabs */}
                                <div class="grid grid-cols-2 p-1 bg-slate-950 border border-slate-800 rounded-xl">
                                    <button 
                                        onClick={() => setQuestTab('social')}
                                        class={`py-2 rounded-lg text-xs font-bold transition-all ${questTab === 'social' ? 'bg-cyber-card text-cyan-400 border border-slate-800/80 shadow-md' : 'text-slate-400'}`}
                                    >
                                        Social Matrix
                                    </button>
                                    <button 
                                        onClick={() => setQuestTab('fitness')}
                                        class={`py-2 rounded-lg text-xs font-bold transition-all ${questTab === 'fitness' ? 'bg-cyber-card text-cyan-400 border border-slate-800/80 shadow-md' : 'text-slate-400'}`}
                                    >
                                        Real Fitness
                                    </button>
                                </div>

                                {/* Active Quest Stack Render */}
                                <div class="flex flex-col gap-2">
                                    {questsData[questTab].map(quest => {
                                        const isCompleted = completedQuests.includes(quest.id);
                                        const isVerifying = verifyingQuest === quest.id;

                                        return (
                                            <div key={quest.id} class="p-3.5 bg-cyber-card border border-slate-800/70 rounded-xl flex items-center justify-between">
                                                <div class="max-w-[70%]">
                                                    <p class="text-xs font-bold text-slate-200 leading-tight">{quest.label}</p>
                                                    <p class="text-[11px] font-black text-amber-400 font-mono mt-1">+{quest.reward.toLocaleString()} $BULV</p>
                                                </div>
                                                
                                                <button
                                                    disabled={isCompleted || verifyingQuest !== null}
                                                    onClick={() => triggerQuestVerification(quest)}
                                                    class={`px-3 py-1.5 rounded-lg text-xs font-bold tracking-wide transition-all ${
                                                        isCompleted
                                                            ? 'bg-slate-900 text-slate-500 border border-slate-800 cursor-not-allowed'
                                                            : isVerifying
                                                            ? 'bg-slate-800 text-cyan-400 flex items-center gap-1 cursor-wait'
                                                            : 'bg-slate-800 text-slate-200 hover:bg-slate-700 active:scale-95 border border-slate-700'
                                                    }`}
                                                >
                                                    {isCompleted ? '✓ Done' : isVerifying ? 'Verifying...' : 'Claim'}
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* TAB 4: WALLET SCREEN */}
                        {activeTab === 'wallet' && (
                            <div class="flex flex-col gap-4 animate-fadeIn">
                                {/* Cyber Asset Master Card */}
                                <div class="bg-gradient-to-br from-slate-900 to-cyber-card border border-slate-800 rounded-2xl p-5 shadow-xl relative overflow-hidden">
                                    <div class="absolute right-0 bottom-0 text-slate-800/20 text-7xl font-black pointer-events-none pr-2 pb-1">TON</div>
                                    <p class="text-[10px] tracking-widest uppercase text-slate-400 font-bold">Total Estimated Value</p>
                                    <h1 class="text-2xl font-black text-slate-100 font-mono mt-1">
                                        {(balance * 0.0012).toFixed(2)} <span class="text-xs font-bold text-cyan-400">TON</span>
                                    </h1>
                                    <p class="text-xs text-slate-500 mt-0.5 font-mono">≈ {balance.toLocaleString()} $BULV Tokens</p>
                                </div>

                                {/* Token Identity Breakdown Metadata Box */}
                                <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-3.5 space-y-2">
                                    <div class="flex justify-between items-center text-xs">
                                        <span class="text-slate-400 font-medium">Asset Protocol Name</span>
                                        <span class="font-bold text-slate-200">BULVARA RPG Token</span>
                                    </div>
                                    <div class="flex justify-between items-center text-xs">
                                        <span class="text-slate-400 font-medium">Ticker Protocol</span>
                                        <span class="font-black text-amber-400 font-mono">$BULV</span>
                                    </div>
                                    <div class="flex justify-between items-center text-xs">
                                        <span class="text-slate-400 font-medium">Total Asset Supply</span>
                                        <span class="font-bold font-mono text-slate-300">10,000,000,000</span>
                                    </div>
                                    <div class="border-t border-slate-800/60 my-1 pt-1.5 flex justify-between items-center text-xs">
                                        <span class="text-slate-400 font-medium">Smart Contract Address</span>
                                        <button 
                                            onClick={() => setPopup({ title: 'System Clipboard', type: 'success', content: 'Mock address string copied to local active clipboard!' })}
                                            class="text-[11px] font-mono bg-slate-950 border border-slate-800 px-2 py-0.5 rounded text-cyan-400 hover:text-cyan-300"
                                        >
                                            jetton_...4b29 📋
                                        </button>
                                    </div>
                                </div>

                                {/* Action Buttons Core Stack */}
                                <div class="flex flex-col gap-2">
                                    <button
                                        onClick={() => setWalletConnected(prev => !prev)}
                                        class={`py-3 rounded-xl text-xs font-bold uppercase tracking-wider flex items-center justify-center gap-2 transition-all duration-150 ${
                                            walletConnected 
                                                ? 'bg-slate-900 border border-cyber-green text-cyber-green' 
                                                : 'bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-slate-950 font-black shadow-lg shadow-blue-500/10 active:scale-95'
                                        }`}
                                    >
                                        <span>🌐</span>
                                        {walletConnected ? 'Connected: EQA1...4b29' : 'Connect TON Wallet'}
                                    </button>

                                    <button
                                        onClick={() => setShowWithdrawModal(true)}
                                        disabled={!walletConnected}
                                        class={`py-3 rounded-xl text-xs font-bold uppercase tracking-wider transition-all duration-150 ${
                                            walletConnected 
                                                ? 'bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-100 border border-slate-700' 
                                                : 'bg-slate-900/40 text-slate-600 border border-slate-950 cursor-not-allowed'
                                        }`}
                                    >
                                        Withdraw $BULV Asset
                                    </button>
                                </div>

                                {/* Tokenomics Breakdown Visual Mini List */}
                                <div class="mt-2">
                                    <h3 class="text-xs uppercase tracking-widest font-black text-slate-400 mb-2 px-1">Tokenomics Core Allocation</h3>
                                    <div class="space-y-1.5">
                                        <div class="flex justify-between items-center bg-slate-900/30 border border-slate-900 p-2 rounded-lg text-xs">
                                            <div class="flex items-center gap-2">
                                                <div class="w-2 h-2 rounded-full bg-cyan-400"></div>
                                                <span class="text-slate-400">Game Ecosystem Rewards</span>
                                            </div>
                                            <span class="font-bold font-mono text-slate-200">50%</span>
                                        </div>
                                        <div class="flex justify-between items-center bg-slate-900/30 border border-slate-900 p-2 rounded-lg text-xs">
                                            <div class="flex items-center gap-2">
                                                <div class="w-2 h-2 rounded-full bg-blue-500"></div>
                                                <span class="text-slate-400">Marketing & Global Airdrops</span>
                                            </div>
                                            <span class="font-bold font-mono text-slate-200">25%</span>
                                        </div>
                                        <div class="flex justify-between items-center bg-slate-900/30 border border-slate-900 p-2 rounded-lg text-xs">
                                            <div class="flex items-center gap-2">
                                                <div class="w-2 h-2 rounded-full bg-amber-400"></div>
                                                <span class="text-slate-400">Core Core Team & Liquidity Pools</span>
                                            </div>
                                            <span class="font-bold font-mono text-slate-200">25%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL GLOBAL OVERLAYS (ALERT NOTIFIER POPUPS) */}
                    {popup && (
                        <div class="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fadeIn">
                            <div class="bg-cyber-card border border-slate-800 rounded-2xl p-5 w-full max-w-[320px] shadow-2xl text-center space-y-3">
                                <div class="text-3xl">
                                    {popup.type === 'success' && '🏆'}
                                    {popup.type === 'error' && '❌'}
                                    {popup.type === 'dna' && '🧬'}
                                </div>
                                <h3 class="text-sm font-black uppercase tracking-wider text-slate-100">{popup.title}</h3>
                                <p class="text-xs text-slate-400 leading-relaxed">{popup.content}</p>
                                <button 
                                    onClick={() => setPopup(null)}
                                    class="w-full py-2 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-200 font-bold rounded-xl text-xs uppercase tracking-wide border border-slate-700"
                                >
                                    Dismiss Interface
                                </button>
                            </div>
                        </div>
                    )}

                    {/* WITHDRAW LOCKED NOTIFICATION MODAL */}
                    {showWithdrawModal && (
                        <div class="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fadeIn">
                            <div class="bg-cyber-card border border-slate-800 rounded-2xl p-5 w-full max-w-[320px] shadow-2xl text-center space-y-3">
                                <div class="text-3xl text-amber-400">🔒</div>
                                <h3 class="text-sm font-black uppercase tracking-wider text-slate-100">Asset Locked</h3>
                                <p class="text-xs text-slate-400 leading-relaxed">
                                    Withdrawals will instantly open after the official token TGE listing pre-sale sequence terminates. Keep harvesting and upgrading mutations in the interim loop!
                                </p>
                                <button 
                                    onClick={() => setShowWithdrawModal(false)}
                                    class="w-full py-2 bg-gradient-to-r from-amber-500 to-orange-600 text-slate-950 font-black rounded-xl text-xs uppercase tracking-wide active:scale-95"
                                >
                                    Acknowledge Terminal
                                </button>
                            </div>
                        </div>
                    )}

                    {/* BOTTOM NAVIGATION BOTTOM BAR BAR */}
                    <nav class="absolute bottom-0 left-0 right-0 h-20 bg-cyber-card/95 border-t border-slate-800/80 backdrop-blur-md px-2 flex items-center justify-around z-30 shrink-0 sm:rounded-b-[28px]">
                        <button 
                            onClick={() => setActiveTab('gym')}
                            class={`flex flex-col items-center justify-center flex-1 h-full transition-all ${activeTab === 'gym' ? 'text-cyan-400 font-bold' : 'text-slate-500'}`}
                        >
                            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
                            </svg>
                            <span class="text-[10px] uppercase tracking-wider">Gym</span>
                        </button>

                        <button 
                            onClick={() => setActiveTab('dna')}
                            class={`flex flex-col items-center justify-center flex-1 h-full transition-all ${activeTab === 'dna' ? 'text-cyan-400 font-bold' : 'text-slate-500'}`}
                        >
                            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12a7.5 7.5 0 0015 0m-15 0a7.5 7.5 0 1115 0m-15 0H3m16.5 0H21m-1.5 0H12m-8.457 3.077l1.41-.513m14.095-5.128l1.41-.513M5.106 17.785l1.15-.827m11.379-8.16l1.15-.827M8.14 21.27l.707-.924m6.83-8.91l.707-.924M12 10v4" />
                            </svg>
                            <span class="text-[10px] uppercase tracking-wider">DNA Lab</span>
                        </button>

                        <button 
                            onClick={() => setActiveTab('quests')}
                            class={`flex flex-col items-center justify-center flex-1 h-full transition-all ${activeTab === 'quests' ? 'text-cyan-400 font-bold' : 'text-slate-500'}`}
                        >
                            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                            <span class="text-[10px] uppercase tracking-wider">Quests</span>
                        </button>

                        <button 
                            onClick={() => setActiveTab('wallet')}
                            class={`flex flex-col items-center justify-center flex-1 h-full transition-all ${activeTab === 'wallet' ? 'text-cyan-400 font-bold' : 'text-slate-500'}`}
                        >
                            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a2.25 2.25 0 00-2.25-2.25H15a3 3 0 11-6 0H5.25A2.25 2.25 0 003 12m18 0v6A2.25 2.25 0 0118.75 20H5.25A2.25 2.25 0 013 18v-6m18 0V9A2.25 2.25 0 0018.75 6.75H5.25A2.25 2.25 0 003 9v3" />
                            </svg>
                            <span class="text-[10px] uppercase tracking-wider">Wallet</span>
                        </button>
                    </nav>

                </div>
            );
        }

        // Render application inside virtual desktop device view wrapper node framework
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
